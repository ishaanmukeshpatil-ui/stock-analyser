  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #000000;
      --bg-secondary: #000000;
      --bg-tertiary: #050505;
      --bg-surface: #0a0a0a;
      --border-primary: #1a1a1a;
      --border-accent: #2a2a2a;
      --border-light: #333333;
      --border-white: rgba(255, 255, 255, 0.08);
      --neon-green: #00ff88;
      --neon-red: #ff3366;
      --neon-blue: #00d4ff;
      --neon-purple: #a855f7;
      --neon-yellow: #fbbf24;
      --text-primary: #ffffff;
      --text-secondary: #999999;
      --text-muted: #666666;
    }
    
    html, body, #root {
      height: 100%;
      background-color: var(--bg-primary);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text-primary);
    }
    
    .bold-heading {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
    }
    
    /* Watermark */
    .watermark {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.15);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      pointer-events: none;
      z-index: 9999;
    }
    
    /* Dropdown items for Current Status */
    .dropdown-item {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-white);
      border-radius: 6px;
      margin-bottom: 6px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dropdown-item:hover { border-color: var(--border-accent); }
    .dropdown-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .dropdown-header .arrow {
      transition: transform 0.2s;
      color: var(--text-muted);
      font-size: 10px;
    }
    .dropdown-header .arrow.open { transform: rotate(180deg); }
    .dropdown-content {
      padding: 0 12px 12px;
      font-size: 11px;
      line-height: 1.6;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-white);
      padding-top: 10px;
    }
    
    /* Watchlist scrollable */
    .watchlist-body {
      max-height: 120px;
      overflow-y: auto;
    }
    
    /* 3 column section layout */
    .status-columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 900px) {
      .status-columns { grid-template-columns: 1fr; }
    }
    .status-column {
      background: var(--bg-primary);
      border: 1px solid var(--border-white);
      border-radius: 6px;
      padding: 12px;
    }
    .status-column-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--neon-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-white);
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border-white); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-accent); }
    
    /* Components */
    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border-white);
      border-radius: 8px;
    }
    
    .btn-primary {
      padding: 10px 20px;
      background: var(--neon-green);
      color: var(--bg-primary);
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    
    .btn-secondary {
      padding: 8px 16px;
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-white);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
    
    .input-field {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-white);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--neon-blue);
    }
    .input-field::placeholder { color: var(--text-muted); }
    
    .source-link {
      color: var(--neon-blue);
      text-decoration: underline;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .source-link:hover { text-shadow: 0 0 8px rgba(0, 212, 255, 0.5); }
    
    /* Layout */
    .app-container { height: 100vh; display: flex; flex-direction: column; }
    
    .header {
      height: 48px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-white);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
    }
    
    .main-container { flex: 1; display: flex; overflow: hidden; }
    
    .sidebar {
      width: 64px;
      background: var(--bg-primary);
      border-right: 1px solid var(--border-white);
      padding: 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .sidebar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sidebar-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .sidebar-item.active { background: var(--bg-tertiary); color: var(--neon-blue); border-left: 2px solid var(--neon-blue); }
    
    .content { flex: 1; padding: 16px; overflow-y: auto; }
    
    /* Chart */
    .chart-container { background: var(--bg-primary); border: 1px solid var(--border-white); border-radius: 8px; overflow: hidden; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border-white); }
    .chart-area { height: 400px; background: var(--bg-primary); }
    
    .timeframe-btn {
      padding: 6px 10px;
      font-size: 11px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .timeframe-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .timeframe-btn.active { background: var(--neon-blue); color: var(--bg-primary); }
    
    /* Data */
    .data-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border-white); font-size: 13px; }
    .data-row:last-child { border-bottom: none; }
    
    /* Watchlist */
    .watchlist-item {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-white);
      transition: all 0.2s;
      font-size: 13px;
    }
    .watchlist-item:hover { background: var(--bg-tertiary); }
    .watchlist-item.selected { background: rgba(0, 212, 255, 0.1); border-left: 2px solid var(--neon-blue); }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--bg-primary);
      border: 1px solid var(--border-white);
      border-radius: 8px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    /* Timeline */
    .timeline-container {
      position: relative;
      padding: 20px 0;
    }
    .timeline-line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border-white);
    }
    .timeline-event {
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }
    .timeline-event:hover .timeline-dot { transform: scale(1.3); }
    .timeline-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid;
      background: var(--bg-primary);
      margin: 0 auto;
      transition: all 0.2s;
    }
    .timeline-dot.positive { border-color: var(--neon-green); }
    .timeline-dot.negative { border-color: var(--neon-red); }
    .timeline-dot.neutral { border-color: var(--neon-yellow); }
    
    /* Chat */
    .chat-container { display: flex; flex-direction: column; height: 100%; }
    .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 14px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
    .message.user { align-self: flex-end; background: rgba(0, 212, 255, 0.15); border: 1px solid rgba(0, 212, 255, 0.3); }
    .message.assistant { align-self: flex-start; background: var(--bg-tertiary); border: 1px solid var(--border-white); }
    .chat-input-container { padding: 12px; border-top: 1px solid var(--border-white); display: flex; gap: 8px; }
    
    /* Section titles */
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-white);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* Factor card */
    .factor-card {
      background: var(--bg-tertiary);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid var(--border-white);
    }
    
    /* Grid layouts */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    
    @media (max-width: 1024px) {
      .grid-4 { grid-template-columns: 1fr 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .grid-2, .grid-4 { grid-template-columns: 1fr; }
      .sidebar { width: 48px; }
    }
    
    /* Quick Actions */
    .quick-action {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border-white);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }
    .quick-action:hover { border-color: var(--neon-blue); color: var(--text-primary); }
    
    /* Prediction */
    .prediction-box {
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.08), rgba(0, 212, 255, 0.08));
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 8px;
      padding: 20px;
    }
    
    /* Loading */
    .loading-dots { display: flex; gap: 4px; }
    .loading-dots span {
      width: 6px; height: 6px;
      background: var(--neon-purple);
      border-radius: 50%;
      animation: bounce 0.6s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.1s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.2s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    /* Resizable */
    .resizable-y { resize: vertical; overflow: auto; min-height: 300px; max-height: 80vh; }
    
    /* Competitor card */
    .competitor-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-white);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .competitor-header {
      font-size: 12px;
      color: var(--neon-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .competitor-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
    }
    
    /* Year selector */
    .year-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border-white);
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }
    .year-btn:hover { border-color: var(--neon-blue); color: var(--text-primary); }
    .year-btn.active { background: var(--neon-blue); color: var(--bg-primary); border-color: var(--neon-blue); }
    
    /* Disclaimer */
    .disclaimer {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-white);
      border-radius: 6px;
      padding: 12px;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
    }
  </style>
</head>

      { symbol: 'TATAMOTORS', name: 'Tata Motors', price: 487.35, change: 5.20, changePercent: 1.08, volume: 15.2 },

    // ============================================
    // SOURCE LINK COMPONENT
    // ============================================
    function SourceLink({ name, url }) {
      return (
        <a href={url} target="_blank" rel="noopener noreferrer" className="source-link">
          [Source: {name}]
        </a>
      );
    }
    
    // ============================================
    // DROPDOWN ITEM COMPONENT (opens modal)
    // ============================================
    function DropdownItem({ title, content, sources, risk }) {
      const [modalOpen, setModalOpen] = React.useState(false);
      
      const riskColors = {
        high: '#ff3366',
        medium: '#fbbf24',
        low: '#00ff88',
        neutral: '#666666'
      };
      
      const riskColor = risk ? riskColors[risk] || riskColors.neutral : null;
      
      return (
        <>
          <div className="dropdown-item" onClick={() => setModalOpen(true)}>
            <div className="dropdown-header">
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                {risk && (
                  <span style={{ 
                    width: '8px', 
                    height: '8px', 
                    borderRadius: '50%', 
                    backgroundColor: riskColor,
                    boxShadow: `0 0 6px ${riskColor}`,
                    flexShrink: 0
                  }}></span>
                )}
                <span>{title}</span>
              </div>
              <span style={{ color: 'var(--text-muted)', fontSize: '10px' }}>Click for details →</span>
            </div>
          </div>
          
          <Modal isOpen={modalOpen} onClose={() => setModalOpen(false)} title={title}>
            <div style={{ fontSize: '13px', lineHeight: 1.8, color: 'var(--text-secondary)' }}>
              {content}
            </div>
            {sources && sources.length > 0 && (
              <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap', marginTop: '16px', paddingTop: '12px', borderTop: '1px solid var(--border-white)' }}>
                {sources.map((s, i) => (
                  <SourceLink key={i} name={s.name} url={s.url} />
                ))}
              </div>
            )}
          </Modal>
        </>
      );
    }
    
    // ============================================
    // MODAL COMPONENT
    // ============================================
    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
              <h2 style={{ fontSize: '18px', fontFamily: "'Inter', sans-serif", fontWeight: 700 }}>{title}</h2>
              <button 
                onClick={onClose}
                style={{ background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: '20px', cursor: 'pointer' }}
              >
                &times;
              </button>
            </div>
            {children}
          </div>
        </div>
      );
    }
    
    // ============================================
    // HEADER COMPONENT
    // ============================================
    function Header({ selectedStock }) {
      const [indices, setIndices] = useState(marketIndices);
      
      useEffect(() => {
        const interval = setInterval(() => {
          setIndices(prev => prev.map(idx => ({
            ...idx,
            value: idx.value * (1 + (Math.random() - 0.5) * 0.001),
            change: idx.change + (Math.random() - 0.5) * 0.01
          })));
        }, 5000);
        return () => clearInterval(interval);
      }, []);
      
      return (
        <header className="header">
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
            <span style={{ fontFamily: "'Inter', sans-serif", fontWeight: 800, fontSize: '20px', color: 'var(--neon-blue)' }}>ISA</span>
            {selectedStock && (
              <span style={{ fontSize: '12px', color: 'var(--text-muted)', borderLeft: '1px solid var(--border-white)', paddingLeft: '12px' }}>
                {selectedStock.symbol}
              </span>
            )}
          </div>
          <div style={{ flex: 1, display: 'flex', gap: '20px', overflow: 'auto' }}>
            {indices.map((idx, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '8px', whiteSpace: 'nowrap' }}>
                <span style={{ color: 'var(--text-secondary)', fontSize: '12px' }}>{idx.name}</span>
                <span style={{ fontFamily: 'JetBrains Mono', fontSize: '12px' }}>
                  {idx.value.toLocaleString('en-IN', { minimumFractionDigits: 2 })}
                </span>
                <span style={{ 
                  fontSize: '11px', 
                  fontFamily: 'JetBrains Mono',
                  color: idx.change >= 0 ? 'var(--neon-green)' : 'var(--neon-red)'
                }}>
                  {idx.change >= 0 ? '+' : ''}{Math.abs(idx.change).toFixed(2)}%
                </span>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--neon-green)', animation: 'pulse 2s infinite' }}></div>
            <span style={{ color: 'var(--neon-green)', fontSize: '12px', fontWeight: 500 }}>OPEN</span>
          </div>
        </header>
      );
    }
    
    // ============================================
    // SIDEBAR COMPONENT

    // ============================================
    // SEARCHABLE STOCK INPUT
    // ============================================
    function StockSearchInput({ onSelect, placeholder = "Search stock (RELIANCE, TCS, HDFC...)" }) {
      const [query, setQuery] = useState('');
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      
      const popularStocks = [
        { symbol: 'RELIANCE', name: 'Reliance Industries' },
        { symbol: 'TCS', name: 'Tata Consultancy Services' },
        { symbol: 'HDFCBANK', name: 'HDFC Bank' },
        { symbol: 'INFY', name: 'Infosys' },
        { symbol: 'ICICIBANK', name: 'ICICI Bank' },
        { symbol: 'HINDUNILVR', name: 'Hindustan Unilever' },
        { symbol: 'SBIN', name: 'State Bank of India' },
        { symbol: 'BHARTIARTL', name: 'Bharti Airtel' },
        { symbol: 'ITC', name: 'ITC Limited' },
        { symbol: 'KOTAKBANK', name: 'Kotak Mahindra Bank' },
        { symbol: 'LT', name: 'Larsen & Toubro' },
        { symbol: 'WIPRO', name: 'Wipro' },
        { symbol: 'AXISBANK', name: 'Axis Bank' },
        { symbol: 'MARUTI', name: 'Maruti Suzuki' },
        { symbol: 'ASIANPAINT', name: 'Asian Paints' },
      ];
      
      const handleSearch = (e) => {
        const value = e.target.value.toUpperCase();
        setQuery(value);
        
        if (value.length > 0) {
          const filtered = popularStocks.filter(s => 
            s.symbol.includes(value) || s.name.toUpperCase().includes(value)
          );
          setSuggestions(filtered);
          setShowSuggestions(true);
        } else {
          setSuggestions([]);
          setShowSuggestions(false);
        }
      };
      
      const handleSelect = (stock) => {
        setQuery(stock.symbol);
        setShowSuggestions(false);
        onSelect(stock.symbol, stock.name);
      };
      
      const handleSubmit = (e) => {
        e.preventDefault();
        if (query) {
          onSelect(query);
          setShowSuggestions(false);
        }
      };
      
      return (
        <div style={{ position: 'relative', flex: 1 }}>
          <form onSubmit={handleSubmit} style={{ display: 'flex', gap: '8px' }}>
            <input
              type="text"
              className="input-field"
              value={query}
              onChange={handleSearch}
              onFocus={() => query && setShowSuggestions(true)}
              onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
              placeholder={placeholder}
            />
            <button type="submit" className="btn-primary">Search</button>
          </form>
          
          {showSuggestions && suggestions.length > 0 && (
            <div style={{
              position: 'absolute',
              top: '100%',
              left: 0,
              right: 0,
              background: 'var(--bg-primary)',
              border: '1px solid var(--border-white)',
              borderRadius: '6px',
              marginTop: '4px',
              maxHeight: '200px',
              overflowY: 'auto',
              zIndex: 100
            }}>
              {suggestions.map((stock, i) => (
                <div
                  key={i}
                  onClick={() => handleSelect(stock)}
                  style={{
                    padding: '10px 16px',
                    cursor: 'pointer',
                    display: 'flex',
                    justifyContent: 'space-between',
                    borderBottom: '1px solid var(--border-white)',
                    transition: 'background 0.2s'
                  }}
                  onMouseEnter={e => e.target.style.background = 'var(--bg-tertiary)'}
                  onMouseLeave={e => e.target.style.background = 'transparent'}
                >
                  <span style={{ fontWeight: 500 }}>{stock.symbol}</span>
                  <span style={{ color: 'var(--text-muted)', fontSize: '12px' }}>{stock.name}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }
    
    // ============================================
    // CURRENT SITUATION PAGE
    // ============================================
    function CurrentSituation({ selectedStock, setSelectedStock }) {
      const [timeframe, setTimeframe] = useState('1M');
      const [selectedSymbol, setSelectedSymbol] = useState(selectedStock?.symbol || 'RELIANCE');
      const [exchange, setExchange] = useState('NSE');
      
      // Update parent state when stock changes
      const handleStockSelect = (symbol, name) => {
        setSelectedSymbol(symbol);
        setSelectedStock({ symbol, name: name || symbol });
      };
      const chartRef = useRef(null);
      
      // Load watchlist from localStorage or use default
      const [watchlist, setWatchlist] = useState(() => {
        const saved = localStorage.getItem('stockWatchlist');
        return saved ? JSON.parse(saved) : defaultWatchlist;
      });
      
      // Show add stock modal
      const [showAddModal, setShowAddModal] = useState(false);
      const [newStockSymbol, setNewStockSymbol] = useState('');
      
      // Save watchlist to localStorage
      useEffect(() => {
        localStorage.setItem('stockWatchlist', JSON.stringify(watchlist));
      }, [watchlist]);
      
      // Draw chart
      useEffect(() => {
        if (chartRef.current && window.LightweightCharts) {
          const chart = window.LightweightCharts.createChart(chartRef.current, {
            layout: { background: { color: '#000000' }, textColor: '#999999' },
            grid: { vertLines: { color: 'rgba(255,255,255,0.06)' }, horzLines: { color: 'rgba(255,255,255,0.06)' } },
            rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' },
            timeScale: { borderColor: 'rgba(255,255,255,0.1)', timeVisible: true },
            crosshair: { mode: 0 },
          });
          
          const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff3366',
            borderUpColor: '#00ff88', borderDownColor: '#ff3366',
            wickUpColor: '#00ff88', wickDownColor: '#ff3366',
          });
          
          // Generate sample data based on symbol
          const basePrice = selectedSymbol === 'RELIANCE' ? 2200 : selectedSymbol === 'TCS' ? 3900 : selectedSymbol === 'HDFCBANK' ? 1650 : 1500;
          const data = [];
          let price = basePrice;
          const startDate = new Date();
          startDate.setDate(startDate.getDate() - 100);
          
          for (let i = 0; i < 100; i++) {
            const date = new Date(startDate);
            date.setDate(date.getDate() + i);
            const change = (Math.random() - 0.48) * 0.02 * price;
            const open = price;
            const close = price + change;
            const high = Math.max(open, close) + Math.random() * (basePrice * 0.005);
            const low = Math.min(open, close) - Math.random() * (basePrice * 0.005);
            
            data.push({
              time: date.toISOString().split('T')[0],
              open: parseFloat(open.toFixed(2)),
              high: parseFloat(high.toFixed(2)),
              low: parseFloat(low.toFixed(2)),
              close: parseFloat(close.toFixed(2))
            });
            price = close;
          }
          
          candleSeries.setData(data);
          chart.timeScale().fitContent();
          
          const handleResize = () => {
            if (chartRef.current) {
              chart.applyOptions({ width: chartRef.current.clientWidth, height: chartRef.current.clientHeight });
            }
          };
          window.addEventListener('resize', handleResize);
          handleResize();
          
          return () => {
            window.removeEventListener('resize', handleResize);
            chart.remove();
          };
        }
      }, [timeframe, selectedSymbol, exchange]);
      
      const timeframes = ['1D', '5D', '1M', '3M', '6M', '1Y', '5Y', 'MAX'];
      
      const handleAddStock = () => {
        if (newStockSymbol && !watchlist.find(s => s.symbol === newStockSymbol.toUpperCase())) {
          const newStock = {
            symbol: newStockSymbol.toUpperCase(),
            name: newStockSymbol.toUpperCase(),
            price: 1000 + Math.random() * 2000,
            change: (Math.random() - 0.5) * 50,
            changePercent: (Math.random() - 0.5) * 3,
            volume: Math.random() * 20
          };
          setWatchlist([...watchlist, newStock]);
          setNewStockSymbol('');
          setShowAddModal(false);
        }
      };
      
      const handleRemoveStock = (symbol) => {
        setWatchlist(watchlist.filter(s => s.symbol !== symbol));
      };
      
      const handleSelectStock = (symbol) => {
        setSelectedSymbol(symbol);
      };
      
      // Get current stock data
      const currentStock = watchlist.find(s => s.symbol === selectedSymbol) || watchlist[0];
      
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', height: '100%' }}>
          {/* Search Bar */}
          <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
            <StockSearchInput 
              onSelect={(symbol, name) => handleStockSelect(symbol, name)}
            />
            <select 
              className="input-field" 
              style={{ width: '100px' }} 
              value={exchange}
              onChange={(e) => setExchange(e.target.value)}
            >
              <option value="NSE">NSE</option>
              <option value="BSE">BSE</option>
            </select>
          </div>
          
          {/* Main Content */}
          <div style={{ flex: 1, display: 'flex', gap: '12px', minHeight: 0 }}>
            {/* Chart */}
            <div className="chart-container" style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
              <div className="chart-header">
                <span style={{ fontWeight: 600, fontSize: '14px' }}>{selectedSymbol}.{exchange}</span>
                <div style={{ display: 'flex', gap: '4px' }}>
                  {timeframes.map(tf => (
                    <button
                      key={tf}
                      className={`timeframe-btn ${timeframe === tf ? 'active' : ''}`}
                      onClick={() => setTimeframe(tf)}
                    >
                      {tf}
                    </button>
                  ))}
                </div>
              </div>
              <div ref={chartRef} className="chart-area resizable-y" />
            </div>
            
            {/* Data Window */}
            <div className="card" style={{ width: '220px', padding: '12px', flexShrink: 0 }}>
              <div style={{ fontWeight: 600, fontSize: '16px', marginBottom: '4px' }}>{selectedSymbol}</div>
              <div style={{ color: 'var(--text-muted)', fontSize: '11px', marginBottom: '12px' }}>{exchange}</div>
              
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)' }}>Date</span>
                <span style={{ fontSize: '12px' }}>{new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: '2-digit' })}</span>
              </div>
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)' }}>Time</span>
                <span style={{ fontSize: '12px' }}>{new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}</span>
              </div>
              
              <div style={{ borderTop: '1px solid var(--border-white)', margin: '8px 0' }}></div>
              
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)' }}>Open</span>
                <span style={{ color: 'var(--neon-green)', fontSize: '12px' }}>Rs.{currentStock?.price?.toFixed(2)}</span>
              </div>
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)' }}>High</span>
                <span style={{ color: 'var(--neon-green)', fontSize: '12px' }}>Rs.{(currentStock?.price * 1.015)?.toFixed(2)}</span>
              </div>
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)' }}>Low</span>
                <span style={{ color: 'var(--neon-red)', fontSize: '12px' }}>Rs.{(currentStock?.price * 0.985)?.toFixed(2)}</span>
              </div>
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)' }}>Close</span>
                <span style={{ color: 'var(--neon-green)', fontSize: '12px' }}>Rs.{currentStock?.price?.toFixed(2)}</span>
              </div>
              
              <div style={{ borderTop: '1px solid var(--border-white)', margin: '8px 0' }}></div>
              
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)' }}>Change</span>
                <span style={{ color: currentStock?.change >= 0 ? 'var(--neon-green)' : 'var(--neon-red)', fontSize: '12px' }}>
                  {currentStock?.change >= 0 ? '+' : ''}{currentStock?.change?.toFixed(2)} ({currentStock?.changePercent >= 0 ? '+' : ''}{currentStock?.changePercent?.toFixed(2)}%)
                </span>
              </div>
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)' }}>Volume</span>
                <span style={{ fontSize: '12px' }}>{currentStock?.volume?.toFixed(1)}M</span>
              </div>
              
              <div style={{ borderTop: '1px solid var(--border-white)', margin: '8px 0' }}></div>
              
              <div style={{ fontSize: '10px', color: 'var(--text-muted)', marginBottom: '6px', textTransform: 'uppercase' }}>Technical Indicators</div>
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)', fontSize: '11px' }}>RSI (14)</span>
                <span style={{ color: 'var(--neon-yellow)', fontSize: '11px' }}>58.3</span>
              </div>
              <div className="data-row">
                <span style={{ color: 'var(--text-muted)', fontSize: '11px' }}>MACD</span>
                <span style={{ color: 'var(--neon-green)', fontSize: '11px' }}>Bullish</span>
              </div>
            </div>
          </div>
          
          {/* Watchlist */}
          <div className="card" style={{ height: '160px', overflow: 'hidden', flexShrink: 0 }}>
            <div style={{ padding: '8px 12px', borderBottom: '1px solid var(--border-white)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

              <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>

                <button 
                  onClick={() => setShowAddModal(true)}
                  style={{ 
                    background: 'var(--neon-blue)', 
                    color: 'var(--bg-primary)', 
                    border: 'none', 
                    borderRadius: '4px',
                    padding: '4px 10px',
                    fontSize: '11px',
                    cursor: 'pointer',
                    fontWeight: 600
                  }}
                >
                  + Add
                </button>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr 1fr 40px', padding: '6px 12px', fontSize: '10px', color: 'var(--text-muted)', borderBottom: '1px solid var(--border-white)', textTransform: 'uppercase' }}>

              <div style={{ textAlign: 'right' }}>Change</div>

              <div></div>

                    {stock.price.toLocaleString('en-IN', { minimumFractionDigits: 2 })}
                  </div>
                  <div style={{ textAlign: 'right', fontFamily: 'JetBrains Mono', fontSize: '11px', color: stock.change >= 0 ? 'var(--neon-green)' : 'var(--neon-red)' }}>
                    {stock.change >= 0 ? '+' : ''}{stock.change.toFixed(2)}

              />
              <div style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end' }}>

          </Modal>
        </div>
      );

      const [selectedEvent, setSelectedEvent] = useState(null);

    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
