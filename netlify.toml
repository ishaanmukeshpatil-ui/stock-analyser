# Netlify configuration for Indian Stock Analyzer

[build]
  # Command to build the project
  command = "npm run build"
  
  # Directory to publish (Vite output)
  publish = "dist"
  
  # Node.js version for Netlify to use
  node_version = "18"

# SPA routing - redirect all to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Environment variables (set these in Netlify dashboard)
# VITE_INDIAN_API_KEY
# VITE_GEMINI_API_KEY

# Cache static assets
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
